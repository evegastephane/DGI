# PostgreSQL — les valeurs sont surchargées par les variables d'env Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/mydb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Désactiver Security temporairement
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Génération des avis PDF — surchargé par les variables d'env Docker
avis.template.path=${AVIS_TEMPLATE_PATH:C:/Users/aloys/Desktop/Projet/dgi-final/backend/src/main/resources/templates/avis_template.docx}
avis.scripts.path=${AVIS_SCRIPTS_PATH:C:/Users/aloys/Desktop/Projet/dgi-final/backend/src/main/resources/scripts}
avis.output.dir=${AVIS_OUTPUT_DIR:C:/Users/aloys/Desktop/Projet/dgi-final/backend/tmp/avis-output}
